name: accountability_app
description: Gambling accountability app with commitments, friend groups, and breach detection.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/gambling_pois.json
    - assets/data/gambling_apps.json
